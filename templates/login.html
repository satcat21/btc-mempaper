<!DOCTYPE html>
<html>
<head>
    <title>{{ translations.dashboard_title }} - {{ translations.login }}</title>
    <link rel="icon" type="image/png" href="static/favicon.png">
    <link rel="stylesheet" href="static/css/theme.css">
    <link rel="stylesheet" href="static/css/login.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body{% if dark_mode %} class="dark-mode"{% endif %}>
    {% if public_dashboard %}
    <!-- Desktop Navigation Buttons (left side) -->
    <div class="desktop-nav-buttons">
        <button id="desktop-back-button" class="nav-button icon-only" onclick="window.location.href='/'" title="{{ translations.back_to_dashboard }}">
            <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px">
                <path d="m274-450 248 248-42 42L140-500l340-340 42 42-248 248h526v60H274Z"/>
            </svg>
        </button>
    </div>

    <!-- Mobile Navigation Buttons (bottom) -->
    <div class="mobile-nav-buttons">
        <button id="mobile-back-button" class="mobile-nav-button icon-only" onclick="window.location.href='/'" title="{{ translations.back_to_dashboard }}">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
                <path d="m274-450 248 248-42 42L140-500l340-340 42 42-248 248h526v60H274Z"/>
            </svg>
        </button>
    </div>
    {% endif %}

    <div class="login-container">
        <div class="login-header">
            <h1>mem<span class="brand-accent">paper</span></h1>
        </div>
        
        <div id="error-message" class="error-message" style="display: none;"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="username">{{ translations.username }}</label>
                <input type="text" id="username" class="form-input" placeholder="{{ translations.username }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">{{ translations.password }}</label>
                <input type="password" id="password" class="form-input" placeholder="{{ translations.password }}" required>
            </div>
            
            <button type="submit" id="login-button" class="login-button">
                {{ translations.login }}
            </button>
        </form>
        
        <div class="community-message">
            Made with ❤️ for the Bitcoin community
        </div>

    </div>
    
    <script src="static/js/login.js"></script>
</body>
</html>
