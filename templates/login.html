<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ translations.dashboard_title }} - {{ translations.login }}</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link rel="icon" type="image/png" href="static/favicon.png">
    <style>{{ 'theme.css'|inline_css|safe }}{{ 'login.css'|inline_css|safe }}</style>
    <link rel="preload" href="static/fonts/Roboto-Regular.ttf" as="font" crossorigin>
    <link rel="preload" href="static/fonts/IBMPlexMono-Medium.ttf" as="font" crossorigin>
    <link rel="preload" href="static/icons/back.svg" as="image">
</head>
<body{% if dark_mode %} class="dark-mode"{% endif %}>
    {% if public_dashboard %}
    <!-- Desktop Navigation Buttons (left side) -->
    <div class="desktop-nav-buttons">
        <button id="desktop-back-button" class="nav-button icon-only" onclick="window.location.href='/'" data-tooltip="{{ translations.back_to_dashboard }}" aria-label="{{ translations.back_to_dashboard }}">
            <img src="/static/icons/back.svg" alt="" width="20" height="20" class="nav-icon">
        </button>
    </div>

    <!-- Mobile Navigation Buttons (bottom) -->
    <div class="mobile-nav-buttons">
        <button id="mobile-back-button" class="mobile-nav-button icon-only" onclick="window.location.href='/'" data-tooltip="{{ translations.back_to_dashboard }}" aria-label="{{ translations.back_to_dashboard }}">
            <img src="/static/icons/back.svg" alt="" width="24" height="24" class="nav-icon">
        </button>
    </div>
    {% endif %}

    <main>
    <div class="login-container">
        <div class="login-header">
            <h1>mem<span class="brand-accent">paper</span></h1>
        </div>
        
        <div id="error-message" class="error-message" style="display: none;"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="username">{{ translations.username }}</label>
                <input type="text" id="username" class="form-input" placeholder="{{ translations.username }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">{{ translations.password }}</label>
                <input type="password" id="password" class="form-input" placeholder="{{ translations.password }}" required>
            </div>
            
            <button type="submit" id="login-button" class="login-button">
                {{ translations.login }}
            </button>
        </form>
        
        <div class="community-message">
            Made with ❤️ for the Bitcoin community
        </div>

    </div>
    </main>

    <script defer src="static/js/login.js"></script>
</body>
</html>
