<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <title>{{ translations.dashboard_title }}</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link rel="icon" type="image/png" href="static/favicon.png">
    <link rel="preload" href="/image?v={{ block_height }}" as="image" fetchpriority="high">
    <link rel="stylesheet" href="static/css/theme.css">
    <link rel="stylesheet" href="static/css/dashboard.css">
    <link rel="preload" href="static/fonts/Roboto-Regular.ttf" as="font" crossorigin>
    <link rel="preload" href="static/fonts/IBMPlexMono-Medium.ttf" as="font" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preload" href="static/icons/settings.svg" as="image">
    <link rel="preload" href="static/icons/logout.svg" as="image">
    <script defer src="static/js/socket.io.min.js"></script>
    <script defer src="static/js/confirm-modal.js"></script>
    <script defer src="static/js/toast.js"></script>
</head>
<body class="orientation-{{ orientation }}{% if dark_mode %} dark-mode{% endif %}">
    <!-- Desktop Navigation - Left Side -->
    <div class="desktop-nav-buttons">
        <a href="/config" id="desktop-config-button" class="nav-button icon-only" title="{{ translations.settings }}">
            <img src="/static/icons/settings.svg" alt="" width="20" height="20" class="nav-icon">
        </a>
        {% if is_authenticated %}
        <button id="desktop-logout-button" class="nav-button icon-only" onclick="logout()" title="{{ translations.logout }}">
            <img src="/static/icons/logout.svg" alt="" width="20" height="20" class="nav-icon">
        </button>
        {% endif %}
    </div>

    <main>
    <img id="dashboard"
         src="/image?v={{ block_height }}"
         alt="{{ translations.dashboard_title }}"
         width="{{ 480 if orientation == 'vertical' else 800 }}"
         height="{{ 800 if orientation == 'vertical' else 480 }}"
         fetchpriority="high"
         loading="eager" />
    </main>
    
    <!-- Mobile Navigation Toggle Button -->
    <button id="mobile-nav-toggle" class="mobile-nav-toggle" onclick="toggleMobileNav()" title="{{ translations.menu }}" aria-label="{{ translations.menu }}">
        <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="#b0b0b0" aria-hidden="true">
            <path d="M256-405.91 181.91-480 480-778.09 778.09-480 704-405.91l-224-223-224 223Z"/>
        </svg>
    </button>
    
    <!-- Mobile Navigation - Hidden by default -->
    <div class="mobile-nav-buttons" id="mobile-nav-buttons">
        <a href="/config" id="mobile-config-button" class="mobile-nav-button icon-only" title="{{ translations.settings }}">
            <img src="/static/icons/settings.svg" alt="" width="24" height="24" class="nav-icon">
        </a>
        {% if is_authenticated %}
        <button id="mobile-logout-button" class="mobile-nav-button icon-only" onclick="logout()" title="{{ translations.logout }}">
            <img src="/static/icons/logout.svg" alt="" width="24" height="24" class="nav-icon">
        </button>
        {% endif %}
    </div>
    
    <script>
        // Device detection and adaptive sizing
        function detectDevice() {
            const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            const isHighDPI = window.devicePixelRatio >= 2;
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            // Add device classes to body for enhanced CSS targeting
            document.body.classList.add(isTouchDevice ? 'touch-device' : 'no-touch');
            document.body.classList.add(isHighDPI ? 'high-dpi' : 'standard-dpi');
            document.body.classList.add(isMobile ? 'mobile-device' : 'desktop-device');
            
            console.log('Device detected:', { isTouchDevice, isHighDPI, isMobile });
        }
        
        // Run device detection on load
        detectDevice();
        
        // Pass translations and config to JavaScript
        window.translations = {
            websocket_connected: "{{ translations.websocket_connected }}",
            websocket_disconnected: "{{ translations.websocket_disconnected }}",
            updated: "{{ translations.updated }}",
            logout: "{{ translations.logout }}",
            confirm_logout: "{{ translations.confirm_logout }}",
            cancel: "{{ translations.cancel }}",
            auto_update_started: "{{ translations.auto_update_started }}",
            auto_update_started_body: "{{ translations.auto_update_started_body }}"
        };
        window.orientation = "{{ orientation }}";
        window.isAuthenticated = {{ 'true' if is_authenticated else 'false' }};
        window.featureFlags = {
            wallet: {{ 'true' if show_wallet else 'false' }},
            bitaxe: {{ 'true' if show_bitaxe else 'false' }},
            donations: {{ 'true' if show_donations else 'false' }}
        };
        
        // Logout function
        async function logout() {
            const confirmed = await showConfirmModal({
                title: window.translations?.logout || 'Logout',
                message: window.translations?.confirm_logout || 'Are you sure you want to logout?',
                confirmText: window.translations?.logout || 'Logout',
                cancelText: window.translations?.cancel || 'Cancel',
                danger: true
            });
            if (!confirmed) return;
            try {
                const response = await fetch('/api/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    // If public dashboard is enabled, stay on dashboard; otherwise go to login
                    if (result.public_dashboard) {
                        window.location.href = '/';
                    } else {
                        window.location.href = '/login';
                    }
                } else {
                    await showAlertModal({ title: 'Error', message: 'Logout failed' });
                }
            } catch (error) {
                console.error('Logout error:', error);
                await showAlertModal({ title: 'Error', message: 'Logout failed' });
            }
        }
        
        // Mobile navigation toggle function
        function toggleMobileNav() {
            const mobileNavButtons = document.getElementById('mobile-nav-buttons');
            const toggleButton = document.getElementById('mobile-nav-toggle');
            const toggleSvg = toggleButton.querySelector('svg');
            
            if (mobileNavButtons.classList.contains('visible')) {
                // Hide navigation
                mobileNavButtons.classList.remove('visible');
                toggleButton.classList.remove('active');
                // Rotate back to original position (pointing up)
                toggleSvg.style.transform = 'rotate(0deg)';
            } else {
                // Show navigation
                mobileNavButtons.classList.add('visible');
                toggleButton.classList.add('active');
                // Rotate to point down (indicating "close" or "fold up")
                toggleSvg.style.transform = 'rotate(180deg)';
            }
        }
        
        // Auto-hide mobile nav after clicking a navigation button
        document.addEventListener('click', function(event) {
            const mobileNavButtons = document.getElementById('mobile-nav-buttons');
            const toggleButton = document.getElementById('mobile-nav-toggle');
            const toggleSvg = toggleButton.querySelector('svg');
            
            // If clicking a navigation button (but not the toggle), hide the nav
            if (event.target.closest('.mobile-nav-button') && !event.target.closest('#mobile-nav-toggle')) {
                mobileNavButtons.classList.remove('visible');
                toggleButton.classList.remove('active');
                toggleSvg.style.transform = 'rotate(0deg)';
            }
            
            // If clicking outside the mobile nav area, hide it
            if (!event.target.closest('.mobile-nav-buttons') && !event.target.closest('.mobile-nav-toggle')) {
                mobileNavButtons.classList.remove('visible');
                toggleButton.classList.remove('active');
                toggleSvg.style.transform = 'rotate(0deg)';
            }
        });
    </script>
    <script defer src="static/js/dashboard.js"></script>
</body>
</html>
